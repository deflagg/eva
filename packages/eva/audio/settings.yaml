server:
  host: 127.0.0.1
  port: 8793


vad:
  aggressiveness: 2
  preroll_ms: 200
  end_silence_ms: 400
  min_utterance_ms: 1000

wake:
  phrases:
    - eva
  match_mode: contains
  case_sensitive: false
  min_confidence: 0.0


stt:
  model_id: small.en
  device: cuda
  compute_type: int8
  cache_dir: ../memory/models/whisper

conversation:
  active_timeout_ms: 25000

speaker:
  enabled: false
  model_id: speechbrain/spkrec-ecapa-voxceleb
  device: cuda
  cache_dir: ../memory/models/speechbrain
  similarity_threshold: 0.20
  min_check_utterance_ms: 1000
  max_voiced_ms: 2000
  short_utterance_policy: ignore

voiceprints:
  dir: ../memory/voiceprints
  ema_alpha: 0.35
